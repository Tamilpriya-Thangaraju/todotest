version: '3.8'

services:
  tododash:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tododash-app
    ports:
      - "80:80"
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:testdb
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=
      - SERVER_PORT=8080
    volumes:
      - ./backend/tododash/src:/app/backend/src
      - ./frontend/src:/app/frontend/src
    restart: unless-stopped
    networks:
      - tododash-network

networks:
  tododash-network:
    driver: bridge
